[project]
name = "agrisat"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    # Data Sources
    "cql2>=0.5.5",
    "boto3>=1.42.92",
    "cdsapi>=0.7.7",
