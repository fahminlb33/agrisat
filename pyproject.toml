    "geopandas>=1.1.3",
    "pyarrow>=23.0.1",
    "netcdf4>=1.7.4",
    "rioxarray>=0.21.0",
    # Plotting
    "hvplot>=0.12.2",
    # LLM
    "openai>=2.32.0",
    # Utilities
    "rich>=15.0.0",
    "httpx>=0.28.1",
    "ipykernel>=7.2.0",
    "python-dotenv>=1.2.2",
]

[dependency-groups]
dev = [
    "ruff>=0.15.12",
]
