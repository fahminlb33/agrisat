# https://websocket.org/guides/infrastructure/nginx/
worker_processes    auto;
error_log           /var/log/nginx/error.log warn;
pid                 /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    map $request_uri $loggable {
        ~^/health$ 0;
        default 1;
    }

    access_log /var/log/nginx/access.log combined if=$loggable;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen               80;
        listen          [::]:80;
        server_name     default;

        client_max_body_size 120M;

        # Security Headers
        # https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
        add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload";
        add_header Content-Security-Policy      "default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net;";
        add_header Permissions-Policy           "camera=()";
        add_header Referrer-Policy              "strict-origin-when-cross-origin";
        add_header X-Frame-Options              "SAMEORIGIN";
        add_header X-Content-Type-Options       "nosniff";

        # Frontend
        location / {
            proxy_pass  http://agrisat-web:3000;
            include     /etc/nginx/proxy.conf;
        }

        # Backend
        location /api {
            proxy_pass  http://agrisat-api:8000;
            include     /etc/nginx/proxy.conf;
        }

        # Agent
        location /adk/ {
            # trailing slash to rewrite the /adk/ prefix
            proxy_pass  http://agrisat-agent:8080/;
            include     /etc/nginx/proxy.conf;
        }
    }
}
